<svg xmlns="http://www.w3.org/2000/svg" width="920" height="470" viewBox="0 0 920 470" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f6f5f2"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#898781" stroke-width="1.6"/>
    </pattern>
    <marker id="pfeil" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="#52514e"/>
    </marker>
  </defs>

  <rect width="920" height="470" fill="white"/>

  <text x="60" y="28" font-size="15" font-weight="bold" fill="#0b0b0b">Sliding Windows &amp; temporales Holdout</text>
  <text x="60" y="46" font-size="12" fill="#52514e">Input-Fenster (Rückblick der Länge L) → Ziel-Fenster (Horizont H) – gebildet aus der Trainingsreihe</text>

  <!-- Holdout-Bereich in der Reihe -->
  <rect x="740" y="56" width="140" height="84" fill="url(#hatch)" stroke="#898781" stroke-width="1"/>
  <text x="810.0" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#52514e">Holdout (letzter Block, Länge H)</text>

