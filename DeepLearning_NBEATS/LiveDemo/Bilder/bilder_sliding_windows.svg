  <text x="893" y="166" text-anchor="end" font-size="11" fill="#52514e">Zeit</text>

  <!-- Grenze zum Holdout -->
  <line x1="740" y1="52" x2="740" y2="440" stroke="#e34948" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Überlappende Trainingsfenster -->
  <text x="60" y="174" font-size="12" font-weight="bold" fill="#0b0b0b">Überlappende Trainingsfenster:</text>
  <rect x="60" y="182" width="140" height="32" rx="4" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="1.6"/><text x="130.0" y="202.0" text-anchor="middle" font-size="11" fill="#0b0b0b">Input (L)</text><rect x="200" y="182" width="140" height="32" rx="4" fill="#e34948" fill-opacity="0.16" stroke="#e34948" stroke-width="1.6"/><text x="270.0" y="202.0" text-anchor="middle" font-size="11" fill="#0b0b0b">Ziel (H)</text>
  <rect x="100" y="220" width="140" height="32" rx="4" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="1.6"/><text x="170.0" y="240.0" text-anchor="middle" font-size="11" fill="#0b0b0b">Input (L)</text><rect x="240" y="220" width="140" height="32" rx="4" fill="#e34948" fill-opacity="0.16" stroke="#e34948" stroke-width="1.6"/><text x="310.0" y="240.0" text-anchor="middle" font-size="11" fill="#0b0b0b">Ziel (H)</text>
  <rect x="140" y="258" width="140" height="32" rx="4" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="1.6"/><text x="210.0" y="278.0" text-anchor="middle" font-size="11" fill="#0b0b0b">Input (L)</text><rect x="280" y="258" width="140" height="32" rx="4" fill="#e34948" fill-opacity="0.16" stroke="#e34948" stroke-width="1.6"/><text x="350.0" y="278.0" text-anchor="middle" font-size="11" fill="#0b0b0b">Ziel (H)</text>
  <text x="430" y="306" font-size="12" fill="#52514e">… viele überlappende Fenster, je einen Zeitschritt weitergeschoben</text>
  <rect x="460" y="316" width="140" height="32" rx="4" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="1.6"/><text x="530.0" y="336.0" text-anchor="middle" font-size="11" fill="#0b0b0b">Input (L)</text><rect x="600" y="316" width="140" height="32" rx="4" fill="#e34948" fill-opacity="0.16" stroke="#e34948" stroke-width="1.6"/><text x="670.0" y="336.0" text-anchor="middle" font-size="11" fill="#0b0b0b">Ziel (H)</text>
  <text x="448" y="336" text-anchor="end" font-size="11" fill="#52514e">letztes Fenster: Ziel endet genau am Holdout-Rand →</text>

  <!-- Validierungs-Fenster -->
  <text x="60" y="384" font-size="12" font-weight="bold" fill="#0b0b0b">Validierung („Generalprobe“):</text>
  <text x="60" y="402" font-size="11" fill="#52514e">Kontext = die L Zeitschritte direkt vor dem Holdout,</text>
  <text x="60" y="417" font-size="11" fill="#52514e">Ziel = der Holdout-Block selbst</text>
  <rect x="600" y="390" width="140" height="32" rx="4" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="1.6" stroke-dasharray="5,3"/><text x="670.0" y="410.0" text-anchor="middle" font-size="11" fill="#0b0b0b">Kontext (L)</text><rect x="740" y="390" width="140" height="32" rx="4" fill="#eb6834" fill-opacity="0.16" stroke="#eb6834" stroke-width="1.6"/><text x="810.0" y="410.0" text-anchor="middle" font-size="11" fill="#0b0b0b">Ziel = Holdout</text>

  <text x="732" y="438" text-anchor="end" font-size="10" fill="#e34948">Trainingsfenster enden spätestens hier</text>
  <text x="60" y="460" font-size="9.5" fill="#898781">Schema, nicht maßstabsgetreu · Fensterbau erst nach Abtrennen des Holdouts – kein Data Leakage</text>
</svg>
